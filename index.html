<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoCamaçari PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  background: #1e293b;
  font-size: 22px;
  font-weight: bold;
}

#map {
  height: 65vh;
}

.info {
  padding: 15px;
  background: #111827;
}

button {
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
🌍 GeoCamaçari PRO - Full Stack
</header>

<div id="map"></div>

<div class="info">
📍 Localização: <span id="loc">Carregando...</span><br>
🌡️ Temperatura: <span id="temp">--</span><br>
🌬️ Vento: <span id="wind">--</span><br>
☁️ Clima: <span id="weather">--</span><br>

<button onclick="centralizar()">Centralizar</button>
</div>

<script>

// Coordenadas base
const lat = -12.6975;
const lon = -38.3242;

// Criar mapa
const map = L.map('map').setView([lat, lon], 12);

// 🔥 CAMADAS
const mapaPadrao = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

const satelite = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');

// Adiciona mapa padrão
mapaPadrao.addTo(map);

// 🔥 BOTÃO MAPA / SATÉLITE
L.control.layers({
  "🗺️ Mapa": mapaPadrao,
  "🛰️ Satélite": satelite
}).addTo(map);

// Marcador principal
L.marker([lat, lon]).addTo(map)
  .bindPopup("Camaçari - BA");

// Clique no mapa
map.on('click', function(e) {
  L.marker([e.latlng.lat, e.latlng.lng])
    .addTo(map)
    .bindPopup(`📍 ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`)
    .openPopup();
});

// Geolocalização
navigator.geolocation.getCurrentPosition(pos => {
  const userLat = pos.coords.latitude;
  const userLon = pos.coords.longitude;

  document.getElementById("loc").innerText =
    userLat.toFixed(4) + ", " + userLon.toFixed(4);

  L.circle([userLat, userLon], {
    radius: 200
  }).addTo(map).bindPopup("Você está aqui");

  map.setView([userLat, userLon], 13);
});

// 🔥 CLIMA VIA PYTHON
async function clima() {
  try {
    const res = await fetch("http://127.0.0.1:5000/clima");
    const data = await res.json();

    document.getElementById("temp").innerText =
      data.temperature + "°C";

    document.getElementById("wind").innerText =
      data.windspeed + " km/h";

    document.getElementById("weather").innerText =
      "Código: " + data.weathercode;

  } catch (erro) {
    document.getElementById("weather").innerText =
      "Erro ao conectar com o servidor";
  }
}

// Botão centralizar
function centralizar() {
  map.setView([lat, lon], 12);
}

// Atualização automática
setInterval(clima, 20000);
clima();

</script>

</body>
</html>
